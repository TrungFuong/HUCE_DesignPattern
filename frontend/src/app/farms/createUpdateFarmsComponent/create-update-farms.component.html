<div class="modal-backdrop" role="presentation">
  <section class="modal" role="dialog" aria-modal="true" [attr.aria-label]="title">
    <header class="modal-header">
      <div>
        <p class="eyebrow">Quản lý nông trại</p>
        <h2>{{ title }}</h2>
      </div>
      <button class="icon-button" type="button" aria-label="Đóng form" (click)="cancel.emit()">×</button>
    </header>

    <form class="farm-form" (ngSubmit)="submit()" #farmForm="ngForm">
      <label>
        Chủ nông trại
        <select
          name="owner_id"
          [(ngModel)]="form.owner_id"
          [disabled]="isLoadingFarmers || ownerLocked"
          required
        >
          <option value="" disabled>
            {{ isLoadingFarmers ? 'Đang tải danh sách nông dân...' : 'Chọn nông dân' }}
          </option>
          @for (farmer of farmers; track farmer.id) {
            <option [value]="farmer.id">{{ farmer.full_name }}</option>
          }
        </select>
        @if (farmersError) {
          <span class="field-error">{{ farmersError }}</span>
        }
        @if (!isLoadingFarmers && !farmers.length && !farmersError) {
          <span class="field-error">Chưa có người dùng nào có vai trò nông dân.</span>
        }
      </label>

      <label>
        Tên nông trại
        <input name="name" type="text" [(ngModel)]="form.name" required />
      </label>

      <label class="full-span">
        Địa chỉ
        <input name="address" type="text" [(ngModel)]="form.address" required />
      </label>

      <label>
        Ngày gieo trồng
        <input name="planting_date" type="date" [(ngModel)]="form.planting_date" />
      </label>

      <label>
        Ngày thu hoạch
        <input name="harvest_date" type="date" [(ngModel)]="form.harvest_date" />
      </label>

      <footer class="modal-actions full-span">
        <button class="secondary-button" type="button" (click)="cancel.emit()">Hủy</button>
        <button class="primary-button" type="submit" [disabled]="farmForm.invalid || isSaving">
          {{ isSaving ? 'Đang lưu...' : (farm ? 'Cập nhật' : 'Tạo mới') }}
        </button>
      </footer>
    </form>
  </section>
</div>
