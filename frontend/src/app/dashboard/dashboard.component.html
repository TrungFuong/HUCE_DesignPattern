<main class="dashboard-shell">
  <aside class="sidebar" aria-label="Danh mục menu">
    <div class="brand">
      <span class="brand-mark">OC</span>
      <span>OCOP Traceability</span>
    </div>

    <nav class="side-menu">
      @for (item of menuItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact }"
        >
          <span class="menu-icon" aria-hidden="true">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="bottom-actions">
      <button class="profile-button" type="button" routerLink="/profile" routerLinkActive="active">
        <span aria-hidden="true">👤</span>
        Thông tin cá nhân
      </button>

      <button class="logout-button" type="button" (click)="logout()">
        <span aria-hidden="true">↩</span>
        Đăng xuất
      </button>
    </div>
  </aside>

  <section class="main-content">

    @if (authMessage) {
      <p class="notice success dashboard-notice">{{ authMessage }}</p>
    }

    <ng-content />
  </section>
</main>
