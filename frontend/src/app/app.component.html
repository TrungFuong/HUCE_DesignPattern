@if (isTracePage) {
  <router-outlet />
} @else if (!token) {
  <main class="shell auth-shell">
    <section class="hero-panel">
      <nav class="topbar" aria-label="Điều hướng chính">
        <div class="brand">
          <span class="brand-mark">OC</span>
          <span>OCOP Traceability</span>
        </div>
        <div class="nav-status">
          <span class="status-dot"></span>
          FastAPI + Angular
        </div>
      </nav>

      <section class="auth-panel" aria-label="Bảng xác thực">
        <div class="auth-header">
          <div>
            <p class="eyebrow">Tài khoản hệ thống</p>
            <h2>{{ authMode === 'login' ? 'Đăng nhập' : 'Đăng ký' }}</h2>
          </div>
          <div class="mode-toggle" aria-label="Chọn chế độ xác thực">
            <button type="button" [class.active]="authMode === 'login'" (click)="setAuthMode('login')">
              Đăng nhập
            </button>
            <button type="button" [class.active]="authMode === 'register'" (click)="setAuthMode('register')">
              Đăng ký
            </button>
          </div>

        <div class="auth-form-stage" [class.register-mode]="authMode === 'register'">
          <form
            class="auth-form auth-form-login"
            [class.active]="authMode === 'login'"
            [attr.aria-hidden]="authMode !== 'login'"
            (ngSubmit)="submitAuth()"
            #authForm="ngForm"
          >
            <label>
              Email
              <input name="email" type="email" [(ngModel)]="form.email" placeholder="farmer@ocop.vn" required email />
            </label>

            <label>
              <span>Mật khẩu <span class="required">*</span></span>
              <div class="password-input-wrapper">
                <input
                  name="password"
                  [type]="showLoginPassword ? 'text' : 'password'"
                  [(ngModel)]="form.password"
                  required
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="toggle-password-btn"
                  (click)="showLoginPassword = !showLoginPassword"
                  tabindex="-1"
                >
                  {{ showLoginPassword ? '👁️' : '👁️‍🗨️' }}
                </button>
              </div>
            </label>

            <button class="primary-action" type="submit" [disabled]="authForm.invalid || isSubmitting">
              {{ isSubmitting ? 'Đang xử lý...' : 'Đăng nhập' }}
            </button>
          </form>

          <form
            class="auth-form auth-form-register"
            [class.active]="authMode === 'register'"
            [attr.aria-hidden]="authMode !== 'register'"
            (ngSubmit)="submitRegister()"
            #registerNgForm="ngForm"
          >
            <label>
              Họ và tên
              <input
                name="registerFullName"
                type="text"
                [(ngModel)]="registerForm.full_name"
                placeholder="Nguyễn Văn A"
                required
              />
            </label>

            <label>
              Email
              <input
                name="registerEmail"
                type="email"
                [(ngModel)]="registerForm.email"
                placeholder="user@ocop.vn"
                required
                email
              />
            </label>

            <label>
              <span>Mật khẩu <span class="required">*</span></span>
              <div class="password-input-wrapper">
                <input
                  name="registerPassword"
                  [type]="showRegisterPassword ? 'text' : 'password'"
                  [(ngModel)]="registerForm.password"
                  required
                  minlength="6"
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="toggle-password-btn"
                  (click)="showRegisterPassword = !showRegisterPassword"
                  tabindex="-1"
                >
                  {{ showRegisterPassword ? '👁️' : '👁️‍🗨️' }}
                </button>
              </div>
            </label>

            <label>
              Vai trò
              <select name="registerRole" [(ngModel)]="registerForm.role" required>
                @for (role of publicRoleOptions; track role.value) {
                <option [ngValue]="role.value">{{ role.label }}</option>
                }
              </select>
            </label>

            <button class="primary-action" type="submit" [disabled]="registerNgForm.invalid || isSubmitting">
              {{ isSubmitting ? 'Đang xử lý...' : 'Đăng ký' }}
            </button>
          </form>
        </div>

            <label>
              Email
              <input
                name="email"
                type="email"
                [(ngModel)]="form.email"
                placeholder="farmer@ocop.vn"
                required
              />
            </label>

            <label>
              <span>Mật khẩu <span class="required">*</span></span>
              <div class="password-input-wrapper">
                <input
                  name="password"
                  [type]="showLoginPassword ? 'text' : 'password'"
                  [(ngModel)]="form.password"
                  required
                  [autocomplete]="authMode === 'login' ? 'current-password' : 'new-password'"
                />
                <button
                  type="button"
                  class="toggle-password-btn"
                  (click)="showLoginPassword = !showLoginPassword"
                  tabindex="-1"
                >
                  {{ showLoginPassword ? '👁️' : '👁️‍🗨️' }}
                </button>
              </div>
            </label>

            @if (authMode === 'register') {
              <label>
                Vai trò
                <select name="role" [(ngModel)]="form.role" required>
                  <option [ngValue]="1">Nông dân</option>
                  <option [ngValue]="2">Thương lái</option>
                  <option [ngValue]="3">Nhà phân phối</option>
                </select>
              </label>
            }

            <button
              class="primary-action"
              type="submit"
              [disabled]="authForm.invalid || isSubmitting"
            >
              {{ isSubmitting ? "Đang xử lý..." : (authMode === 'login' ? "Đăng nhập" : "Đăng ký") }}
            </button>
          </form>

          @if (authMessage) {
            <p class="notice success">{{ authMessage }}</p>
          }

          @if (authError) {
            <p class="notice error">{{ authError }}</p>
          }
        </section>
      </div>
    </section>
  </main>
} @else {
<app-dashboard [authMessage]="authMessage" (logoutRequested)="logout()">
  <router-outlet />
</app-dashboard>
}
